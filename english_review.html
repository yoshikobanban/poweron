<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英語復習クイズ</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0F1117;
  --surface: #1A1D27;
  --surface2: #22263A;
  --border: #2E3350;
  --logic-accent: #4F8EF7;
  --logic-light: rgba(79,142,247,0.12);
  --comm-accent: #F76E4F;
  --comm-light: rgba(247,110,79,0.12);
  --green: #3DD68C;
  --green-light: rgba(61,214,140,0.12);
  --red: #F75F5F;
  --red-light: rgba(247,95,95,0.12);
  --yellow: #F7C948;
  --text: #E8EAF2;
  --text-dim: #7B809A;
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--text);
  padding: 12px;
}
.container { max-width: 640px; margin: 0 auto; }

/* タブ */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  background: var(--surface);
  padding: 6px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
.tab-btn {
  flex: 1;
  padding: 10px 8px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text-dim);
  background: transparent;
  line-height: 1.4;
}
.tab-btn.active-logic {
  background: var(--logic-accent);
  color: white;
}
.tab-btn.active-comm {
  background: var(--comm-accent);
  color: white;
}

/* ヘッダー */
.header {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 18px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-title { font-size: 16px; font-weight: 900; flex: 1; }
.header-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.score-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 20px;
  white-space: nowrap;
}
.score-logic { background: var(--logic-light); color: var(--logic-accent); border: 1px solid var(--logic-accent); }
.score-comm  { background: var(--comm-light);  color: var(--comm-accent);  border: 1px solid var(--comm-accent); }

/* モード切り替え */
.mode-toggle {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
}
.mode-btn {
  flex: 1;
  padding: 9px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  font-family: inherit;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  background: var(--surface);
  color: var(--text-dim);
  transition: all 0.2s;
}
.mode-btn.active-logic { border-color: var(--logic-accent); color: var(--logic-accent); background: var(--logic-light); }
.mode-btn.active-comm  { border-color: var(--comm-accent);  color: var(--comm-accent);  background: var(--comm-light); }

/* プログレス */
.progress-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 16px;
  margin-bottom: 12px;
}
.progress-info {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 7px;
  font-family: 'JetBrains Mono', monospace;
}
.progress-bar { background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
.progress-fill {
  height: 6px; border-radius: 4px;
  transition: width 0.4s ease;
}
.fill-logic { background: linear-gradient(90deg, var(--logic-accent), #A0C4FF); }
.fill-comm  { background: linear-gradient(90deg, var(--comm-accent),  #FFB89A); }

/* 問題カード */
.question-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
}
.q-tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 12px;
}
.tag-logic { background: var(--logic-light); color: var(--logic-accent); border: 1px solid var(--logic-accent); }
.tag-comm  { background: var(--comm-light);  color: var(--comm-accent);  border: 1px solid var(--comm-accent); }
.q-en {
  font-size: 16px;
  line-height: 1.8;
  color: var(--text);
  margin-bottom: 10px;
}
.blank {
  display: inline-block;
  border-bottom: 2px solid var(--logic-accent);
  min-width: 90px;
  text-align: center;
  color: var(--logic-accent);
  font-weight: 700;
  padding: 0 4px;
  font-family: 'JetBrains Mono', monospace;
}
.blank-comm { border-color: var(--comm-accent); color: var(--comm-accent); }
.q-ja {
  font-size: 13px;
  color: var(--text-dim);
  padding: 8px 12px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  line-height: 1.7;
  border-left: 3px solid var(--border);
}

/* 語順問題 */
.sort-area { margin-top: 16px; }
.sort-label { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
.word-pool {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  min-height: 48px;
  padding: 10px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  margin-bottom: 10px;
}
.word-chip {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 14px;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid;
  user-select: none;
}
.word-chip.pool-chip {
  background: var(--surface);
  border-color: var(--border);
  color: var(--text);
}
.word-chip.pool-chip:hover { border-color: var(--logic-accent); color: var(--logic-accent); }
.word-chip.pool-chip.comm-pool:hover { border-color: var(--comm-accent); color: var(--comm-accent); }
.word-chip.answer-chip {
  background: var(--logic-light);
  border-color: var(--logic-accent);
  color: var(--logic-accent);
}
.word-chip.answer-chip.comm-chip {
  background: var(--comm-light);
  border-color: var(--comm-accent);
  color: var(--comm-accent);
}
.answer-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  min-height: 48px;
  padding: 10px;
  background: var(--bg);
  border-radius: var(--radius-sm);
  border: 2px dashed var(--border);
  margin-bottom: 12px;
}
.answer-row.has-words { border-style: solid; }
.check-btn {
  width: 100%;
  padding: 12px;
  border-radius: var(--radius-sm);
  border: none;
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.check-logic { background: var(--logic-accent); color: white; }
.check-comm  { background: var(--comm-accent);  color: white; }
.check-btn:hover { opacity: 0.88; transform: translateY(-1px); }
.check-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

/* 選択肢 */
.choices { display: flex; flex-direction: column; gap: 9px; margin-top: 16px; }
.choice-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface2);
  font-family: inherit;
  font-size: 14px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text);
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
  width: 100%;
}
.choice-btn:hover:not(:disabled) { border-color: var(--logic-accent); background: var(--logic-light); }
.choice-btn.comm-btn:hover:not(:disabled) { border-color: var(--comm-accent); background: var(--comm-light); }
.choice-btn:disabled { cursor: default; }
.choice-label {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--border);
  font-weight: 700; font-size: 12px;
  color: var(--text-dim);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.choice-btn.correct { border-color: var(--green); background: var(--green-light); }
.choice-btn.correct .choice-label { background: var(--green); color: #0F1117; }
.choice-btn.wrong { border-color: var(--red); background: var(--red-light); }
.choice-btn.wrong .choice-label { background: var(--red); color: white; }
.choice-btn.show-answer { border-color: var(--green); background: var(--green-light); }
.choice-btn.show-answer .choice-label { background: var(--green); color: #0F1117; }

/* 解説 */
.explanation {
  display: none;
  margin-top: 14px;
  padding: 14px;
  background: var(--surface2);
  border-left: 3px solid var(--logic-accent);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.explanation.show { display: block; }
.explanation.comm-ex { border-color: var(--comm-accent); }
.ex-correct { font-size: 13px; font-weight: 700; color: var(--green); margin-bottom: 6px; }
.ex-text { font-size: 13px; color: var(--text-dim); line-height: 1.7; }

/* sort結果 */
.sort-result {
  display: none;
  margin-top: 12px;
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  line-height: 1.7;
}
.sort-result.show { display: block; }
.sort-correct { background: var(--green-light); border: 1px solid var(--green); color: var(--green); }
.sort-wrong   { background: var(--red-light);   border: 1px solid var(--red);   color: var(--text); }
.sort-ans { color: var(--green); font-weight: 700; font-family: 'JetBrains Mono', monospace; display: block; margin-top: 4px; }
.sort-ex  { color: var(--text-dim); margin-top: 6px; display: block; }

/* ナビ */
.nav-wrap { display: none; margin-top: 12px; }
.nav-wrap.show { display: block; }
.next-btn {
  width: 100%;
  padding: 14px;
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.next-btn:hover { border-color: var(--logic-accent); color: var(--logic-accent); }
.next-btn.comm-next:hover { border-color: var(--comm-accent); color: var(--comm-accent); }

/* 結果 */
.result-screen { display: none; }
.result-screen.show { display: block; }
.quiz-area.hide { display: none; }

.result-hero {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 20px;
  text-align: center;
  margin-bottom: 12px;
}
.result-icon { font-size: 44px; margin-bottom: 8px; }
.result-score { font-size: 52px; font-weight: 900; font-family: 'JetBrains Mono', monospace; line-height: 1; }
.score-c-logic { color: var(--logic-accent); }
.score-c-comm  { color: var(--comm-accent); }
.result-denom { font-size: 20px; color: var(--text-dim); }
.result-pct { font-size: 16px; color: var(--text-dim); margin: 6px 0; }
.result-msg { font-size: 15px; font-weight: 700; margin-top: 10px; }

.stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  text-align: center;
}
.stat-num { font-size: 24px; font-weight: 900; font-family: 'JetBrains Mono', monospace; }
.stat-lbl { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

.miss-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.miss-title { font-size: 13px; font-weight: 700; color: var(--red); margin-bottom: 10px; }
.miss-item { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; line-height: 1.6; }
.miss-item:last-child { border-bottom: none; }
.miss-qnum { color: var(--text-dim); }
.miss-en { color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px; margin-top: 2px; }
.miss-ans { color: var(--green); font-weight: 700; font-size: 12px; margin-top: 2px; }
.miss-tag { display: inline-block; background: var(--surface2); color: var(--text-dim); font-size: 10px; padding: 1px 6px; border-radius: 4px; margin-left: 4px; }

.retry-btn {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 8px;
}
.retry-logic { background: var(--logic-accent); color: white; }
.retry-comm  { background: var(--comm-accent);  color: white; }
.retry-btn:hover { opacity: 0.88; }

/* シャッフルボタン */
.shuffle-btn {
  border-radius: 20px;
  padding: 5px 12px;
  font-family: inherit;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-dim);
}
.shuffle-btn.on-logic { border-color: var(--logic-accent); color: var(--logic-accent); background: var(--logic-light); }
.shuffle-btn.on-comm  { border-color: var(--comm-accent);  color: var(--comm-accent);  background: var(--comm-light); }
</style>
</head>
<body>
<div class="container">
  <!-- タブ -->
  <div class="tabs">
    <button class="tab-btn active-logic" id="tabLogic" onclick="switchTab('logic')">📝 論理表現 II<br><span style="font-size:10px;font-weight:400">不定詞・動名詞</span></button>
    <button class="tab-btn" id="tabComm" onclick="switchTab('comm')">📖 英語コミュニケーション II<br><span style="font-size:10px;font-weight:400">語彙・読解</span></button>
  </div>

  <!-- 論理表現IIエリア -->
  <div id="logicArea">
    <div class="header">
      <div style="flex:1">
        <div class="header-title" style="color:var(--logic-accent)">論理表現 II</div>
        <div class="header-sub">不定詞・動名詞 復習クイズ</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <div class="score-badge score-logic" id="lScoreBadge">0点</div>
        <button class="shuffle-btn" id="lShuffleBtn" onclick="toggleShuffle('logic')">🔀 シャッフル</button>
      </div>
    </div>
    <!-- モード切り替え -->
    <div class="mode-toggle">
      <button class="mode-btn active-logic" id="lModeChoice" onclick="setMode('logic','choice')">◉ 選択問題</button>
      <button class="mode-btn" id="lModeSort" onclick="setMode('logic','sort')">⇄ 語順並べ替え</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-info"><span id="lProgressText">1 / 1</span><span id="lProgressPct">0%</span></div>
      <div class="progress-bar"><div class="progress-fill fill-logic" id="lProgressFill" style="width:0%"></div></div>
    </div>
    <div class="quiz-area" id="lQuizArea">
      <div class="question-card" id="lQCard"></div>
      <div class="nav-wrap" id="lNavWrap">
        <button class="next-btn" id="lNextBtn" onclick="nextQ('logic')">次の問題 →</button>
      </div>
    </div>
    <div class="result-screen" id="lResultScreen"></div>
  </div>

  <!-- 英語コミュニケーションIIエリア -->
  <div id="commArea" style="display:none">
    <div class="header">
      <div style="flex:1">
        <div class="header-title" style="color:var(--comm-accent)">英語コミュニケーション II</div>
        <div class="header-sub">語彙・読解 復習クイズ</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <div class="score-badge score-comm" id="cScoreBadge">0点</div>
        <button class="shuffle-btn" id="cShuffleBtn" onclick="toggleShuffle('comm')">🔀 シャッフル</button>
      </div>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn active-comm" id="cModeChoice" onclick="setMode('comm','choice')">◉ 選択問題</button>
      <button class="mode-btn" id="cModeSort" onclick="setMode('comm','sort')">⇄ 語順並べ替え</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-info"><span id="cProgressText">1 / 1</span><span id="cProgressPct">0%</span></div>
      <div class="progress-bar"><div class="progress-fill fill-comm" id="cProgressFill" style="width:0%"></div></div>
    </div>
    <div class="quiz-area" id="cQuizArea">
      <div class="question-card" id="cQCard"></div>
      <div class="nav-wrap" id="cNavWrap">
        <button class="next-btn comm-next" id="cNextBtn" onclick="nextQ('comm')">次の問題 →</button>
      </div>
    </div>
    <div class="result-screen" id="cResultScreen"></div>
  </div>
</div>

<script>
// ============================================================
// 論理表現II 選択問題
// ============================================================
const logicChoiceQ = [
  {tag:"名詞的用法",en:"It is important ___ enough sleep.",ja:"十分な睡眠をとることが大切だ。",choices:["to get","getting","get","for get"],ans:0,ex:"It is＋形容詞＋to do の形式主語構文。It = to get enough sleep。"},
  {tag:"名詞的用法",en:"Her dream is ___ a singer.",ja:"彼女の夢は歌手になることだ。",choices:["to be","being","be","to being"],ans:0,ex:"補語になる不定詞。Her dream = to be a singer の関係。"},
  {tag:"名詞的用法",en:"I hope ___ to university.",ja:"私は大学に行くことを希望しています。",choices:["to go","going","go","for going"],ans:0,ex:"hope は不定詞だけを目的語にとる動詞。hope to do。"},
  {tag:"名詞的用法",en:"She decided ___ her job.",ja:"彼女は仕事を辞めることを決めた。",choices:["to quit","quitting","quit","for quit"],ans:0,ex:"decide to do「〜することを決める」。不定詞のみOK。"},
  {tag:"形容詞的用法",en:"I have a lot of things ___ today.",ja:"私には今日するべきことがたくさんある。",choices:["to do","doing","do","for do"],ans:0,ex:"things を修飾する形容詞的用法。things to do「するべきこと」。"},
  {tag:"形容詞的用法",en:"I need a chair ___.",ja:"私は座るための椅子が必要だ。",choices:["to sit on","to sit","sitting","sat on"],ans:0,ex:"a chair to sit on。sit on a chair の on が残る。前置詞を忘れずに！"},
  {tag:"副詞的用法",en:"I got up early ___ the 6:30 train.",ja:"私は6時30分の列車に乗るために早く起きた。",choices:["to catch","catching","catch","for catch"],ans:0,ex:"目的を表す不定詞「〜するために」。"},
  {tag:"副詞的用法",en:"I'm glad ___ you.",ja:"私はあなたに会えてうれしいです。",choices:["to see","seeing","see","for see"],ans:0,ex:"感情の原因を表す不定詞。glad to see「会えてうれしい」。"},
  {tag:"意味上の主語",en:"It is important ___ to get enough sleep.",ja:"私たちが十分な睡眠をとることが大切だ。",choices:["for us","of us","for we","of we"],ans:0,ex:"important は人の性質を表さない形容詞 → for。for us to do の形。"},
  {tag:"意味上の主語",en:"It was kind ___ to help me.",ja:"私を助けてくれるなんてあなたは親切だった。",choices:["of you","for you","of your","for your"],ans:0,ex:"kind は人の性質を表す形容詞 → of。It was kind of you to do。"},
  {tag:"意味上の主語",en:"It was careless ___ to leave the light on.",ja:"電気をつけっぱなしにするとはあなたは不注意だった。",choices:["of you","for you","of your","for your"],ans:0,ex:"careless は人の性質を表す → of。It was careless of you to do。"},
  {tag:"SVO+to不定詞",en:"Our teacher told us ___ each other.",ja:"先生は私たちにお互いを助け合うように言った。",choices:["to help","help","helping","helped"],ans:0,ex:"tell＋O＋to do「Oに〜するように言う」。"},
  {tag:"SVO+to不定詞",en:"My mother asked me ___ to the supermarket.",ja:"母は私にスーパーへ行くよう頼んだ。",choices:["to go","going","go","for go"],ans:0,ex:"ask＋O＋to do「Oに〜するよう頼む」。"},
  {tag:"SVO+to不定詞",en:"My parents allowed me ___ abroad.",ja:"両親は私が留学するのを許してくれた。",choices:["to study","studying","study","for study"],ans:0,ex:"allow＋O＋to do「Oが〜するのを許す」。"},
  {tag:"原形不定詞",en:"My mother made me ___ my room.",ja:"母は私に部屋の掃除をさせた。",choices:["clean","to clean","cleaning","cleaned"],ans:0,ex:"make＋O＋原形（to なし）。「強制的に〜させる」。"},
  {tag:"原形不定詞",en:"My father let me ___ to the movies.",ja:"父は私を映画に行かせてくれた。",choices:["go","to go","going","went"],ans:0,ex:"let＋O＋原形（to なし）。「許可して〜させる」。"},

// ============================================================
// State
// ============================================================
const state = {
  logic: { cur:0, score:0, answered:false, wrongList:[], shuffle:false, mode:'choice', active:[] },
  comm:  { cur:0, score:0, answered:false, wrongList:[], shuffle:false, mode:'choice', active:[] },
};
let currentTab = 'logic';
// 語順問題用
const sortState = { logic:{placed:[], pool:[]}, comm:{placed:[], pool:[]} };

function shuffleArr(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('logicArea').style.display = tab==='logic'?'block':'none';
  document.getElementById('commArea').style.display  = tab==='comm' ?'block':'none';
  document.getElementById('tabLogic').className = 'tab-btn' + (tab==='logic'?' active-logic':'');
  document.getElementById('tabComm').className  = 'tab-btn' + (tab==='comm' ?' active-comm':'');
}

function toggleShuffle(tab) {
  const s = state[tab];
  s.shuffle = !s.shuffle;
  const btn = document.getElementById(tab==='logic'?'lShuffleBtn':'cShuffleBtn');
  btn.className = 'shuffle-btn' + (s.shuffle ? (' on-'+tab) : '');
  btn.textContent = s.shuffle ? '🔀 シャッフル中' : '🔀 シャッフル';
  initQuiz(tab);
}

function setMode(tab, mode) {
  state[tab].mode = mode;
  const prefix = tab==='logic'?'l':'c';
  document.getElementById(prefix+'ModeChoice').className = 'mode-btn' + (mode==='choice'?' active-'+tab:'');
  document.getElementById(prefix+'ModeSort').className   = 'mode-btn' + (mode==='sort'  ?' active-'+tab:'');
  initQuiz(tab);
}

function initQuiz(tab) {
  const s = state[tab];
  s.cur=0; s.score=0; s.answered=false; s.wrongList=[];
  const pool = s.mode==='choice'
    ? (tab==='logic'?logicChoiceQ:commChoiceQ)
    : (tab==='logic'?logicSortQ:commSortQ);
  s.active = s.shuffle ? shuffleArr(pool) : [...pool];
  const prefix = tab==='logic'?'l':'c';
  document.getElementById(prefix+'QuizArea').classList.remove('hide');
  document.getElementById(prefix+'ResultScreen').classList.remove('show');
  renderQ(tab);
}

function renderQ(tab) {
  const s = state[tab];
  const q = s.active[s.cur];
  const prefix = tab==='logic'?'l':'c';
  const total = s.active.length;
  const pct = Math.round((s.cur/total)*100);
  document.getElementById(prefix+'ProgressText').textContent = (s.cur+1)+' / '+total;
  document.getElementById(prefix+'ProgressPct').textContent = pct+'%';
  document.getElementById(prefix+'ProgressFill').style.width = pct+'%';
  document.getElementById(tab==='logic'?'lScoreBadge':'cScoreBadge').textContent = s.score+'点';
  s.answered = false;

  const nextBtn = document.getElementById(prefix+'NextBtn');
  if(nextBtn) nextBtn.textContent = s.cur+1<total?'次の問題 →':'結果を見る';

  document.getElementById(prefix+'NavWrap').classList.remove('show');

  if(s.mode==='choice') renderChoice(tab, q);
  else renderSort(tab, q);
}

function renderChoice(tab, q) {
  const prefix = tab==='logic'?'l':'c';
  const isComm = tab==='comm';
  const blankClass = isComm?'blank blank-comm':'blank';
  const tagClass = isComm?'q-tag tag-comm':'q-tag tag-logic';
  const labels = ['A','B','C','D'];

  // 選択肢シャッフル（正解位置をランダムに）
  const idxs = shuffleArr([0,1,2,3]);
  const shuffledChoices = idxs.map(i=>q.choices[i]);
  const newAns = idxs.indexOf(q.ans);

  const choicesHTML = shuffledChoices.map((c,i)=>`
    <button class="choice-btn${isComm?' comm-btn':''}" id="${prefix}choice${i}" onclick="answer('${tab}',${i},${newAns})">
      <span class="choice-label">${labels[i]}</span>
      <span>${c}</span>
    </button>
  `).join('');

  document.getElementById(prefix+'QCard').innerHTML = `
    <span class="${tagClass}">${q.tag}</span>
    <div class="q-en">${q.en.replace('___','<span class="'+blankClass+'">　　　　</span>').replace('( )','<span class="'+blankClass+'">　　　　</span>')}</div>
    <div class="q-ja">${q.ja}</div>
    <div class="choices">${choicesHTML}</div>
    <div class="explanation${isComm?' comm-ex':''}" id="${prefix}explanation">
      <div class="ex-correct">✓ 正解：${shuffledChoices[newAns]}</div>
      <div class="ex-text">${q.ex}</div>
    </div>
  `;
}

function answer(tab, i, correctIdx) {
  const s = state[tab];
  if(s.answered) return;
  s.answered = true;
  const prefix = tab==='logic'?'l':'c';
  const btns = document.querySelectorAll(`#${prefix}QCard .choice-btn`);
  btns.forEach(b=>b.disabled=true);
  if(i===correctIdx) {
    btns[i].classList.add('correct');
    s.score++;
  } else {
    btns[i].classList.add('wrong');
    btns[correctIdx].classList.add('show-answer');
    s.wrongList.push(s.cur);
  }
  document.getElementById(prefix+'explanation').classList.add('show');
  document.getElementById(tab==='logic'?'lScoreBadge':'cScoreBadge').textContent = s.score+'点';
  document.getElementById(prefix+'NavWrap').classList.add('show');
}

function renderSort(tab, q) {
  const prefix = tab==='logic'?'l':'c';
  const isComm = tab==='comm';
  const tagClass = isComm?'q-tag tag-comm':'q-tag tag-logic';

  sortState[tab].placed = [];
  sortState[tab].pool = shuffleArr([...q.words]);

  const ss = sortState[tab];

  document.getElementById(prefix+'QCard').innerHTML = `
    <span class="${tagClass}">${q.tag}</span>
    <div class="q-ja" style="font-size:15px;color:var(--text);margin-bottom:12px">${q.en}</div>
    <div class="sort-area">
      <div class="sort-label">↓ タップして選ぶ</div>
      <div class="word-pool" id="${prefix}Pool">${ss.pool.map((w,i)=>`<span class="word-chip pool-chip${isComm?' comm-pool':''}" onclick="pickWord('${tab}',${i})">${w}</span>`).join('')}</div>
      <div class="sort-label">↓ 並べた順番（タップで戻す）</div>
      <div class="answer-row" id="${prefix}AnswerRow"></div>
      <button class="check-btn check-${tab}" onclick="checkSort('${tab}')" id="${prefix}CheckBtn">答え合わせ</button>
    </div>
    <div class="sort-result" id="${prefix}SortResult"></div>
  `;
}

function pickWord(tab, poolIdx) {
  const s = sortState[tab];
  const prefix = tab==='logic'?'l':'c';
  const isComm = tab==='comm';

  const word = s.pool[poolIdx];
  if(word===null) return;
  s.pool[poolIdx] = null;
  s.placed.push({word, poolIdx});

  // re-render pool
  const poolEl = document.getElementById(prefix+'Pool');
  poolEl.innerHTML = s.pool.map((w,i)=>w===null?'':`<span class="word-chip pool-chip${isComm?' comm-pool':''}" onclick="pickWord('${tab}',${i})">${w}</span>`).join('');

  // render answer row
  const ansEl = document.getElementById(prefix+'AnswerRow');
  ansEl.classList.add('has-words');
  ansEl.innerHTML = s.placed.map((p,i)=>`<span class="word-chip answer-chip${isComm?' comm-chip':''}" onclick="removeWord('${tab}',${i})">${p.word}</span>`).join('');
}

function removeWord(tab, placedIdx) {
  const s = sortState[tab];
  const prefix = tab==='logic'?'l':'c';
  const isComm = tab==='comm';

  const item = s.placed[placedIdx];
  s.pool[item.poolIdx] = item.word;
  s.placed.splice(placedIdx, 1);

  // re-render pool
  const poolEl = document.getElementById(prefix+'Pool');
  poolEl.innerHTML = s.pool.map((w,i)=>w===null?'':`<span class="word-chip pool-chip${isComm?' comm-pool':''}" onclick="pickWord('${tab}',${i})">${w}</span>`).join('');

  // re-render answer row
  const ansEl = document.getElementById(prefix+'AnswerRow');
  if(s.placed.length===0) ansEl.classList.remove('has-words');
  ansEl.innerHTML = s.placed.map((p,i)=>`<span class="word-chip answer-chip${isComm?' comm-chip':''}" onclick="removeWord('${tab}',${i})">${p.word}</span>`).join('');
}

function checkSort(tab) {
  const s = state[tab];
  const ss = sortState[tab];
  const prefix = tab==='logic'?'l':'c';
  const q = s.active[s.cur];

  const userAns = ss.placed.map(p=>p.word).join(' ');
  const correct = userAns === q.ans;

  if(correct) s.score++;
  else s.wrongList.push(s.cur);
  s.answered = true;

  document.getElementById(prefix+'CheckBtn').disabled = true;

  const resultEl = document.getElementById(prefix+'SortResult');
  resultEl.classList.add('show');
  if(correct) {
    resultEl.className = 'sort-result show sort-correct';
    resultEl.innerHTML = `✓ 正解！<span class="sort-ex">${q.ex}</span>`;
  } else {
    resultEl.className = 'sort-result show sort-wrong';
    resultEl.innerHTML = `✗ 不正解<span class="sort-ans">正解：${q.ans}</span><span class="sort-ex">${q.ex}</span>`;
  }

  document.getElementById(tab==='logic'?'lScoreBadge':'cScoreBadge').textContent = s.score+'点';
  document.getElementById(prefix+'NavWrap').classList.add('show');
}

function nextQ(tab) {
  const s = state[tab];
  s.cur++;
  if(s.cur>=s.active.length) showResult(tab);
  else renderQ(tab);
}

function showResult(tab) {
  const s = state[tab];
  const prefix = tab==='logic'?'l':'c';
  const isComm = tab==='comm';
  document.getElementById(prefix+'QuizArea').classList.add('hide');
  const rs = document.getElementById(prefix+'ResultScreen');
  rs.classList.add('show');

  const pct = Math.round((s.score/s.active.length)*100);
  let icon,msg;
  if(pct>=90){icon='🏆';msg='すごい！ほぼ完璧！';}
  else if(pct>=70){icon='⭐';msg='よくできました！';}
  else if(pct>=50){icon='💪';msg='もう少しで合格ライン！';}
  else{icon='📖';msg='復習してまた挑戦しよう！';}

  const modeLabel = s.mode==='choice'?'選択問題':'語順並べ替え';
  const missHTML = s.wrongList.length>0 ? `
    <div class="miss-section">
      <div class="miss-title">✗ 間違えた問題（${s.wrongList.length}問）</div>
      ${s.wrongList.map(idx=>{
        const wq=s.active[idx];
        return `<div class="miss-item">
          <span class="miss-qnum">問${idx+1}</span><span class="miss-tag">${wq.tag}</span>
          <div class="miss-en">${s.mode==='choice'?wq.en.replace('___','＿＿＿'):wq.en}</div>
          <div class="miss-ans">正解：${s.mode==='choice'?wq.choices[wq.ans]:wq.ans}</div>
        </div>`;
      }).join('')}
    </div>
  ` : `<div style="background:var(--green-light);border:1px solid var(--green);border-radius:12px;padding:16px;text-align:center;color:var(--green);font-weight:700;margin-bottom:12px">全問正解！パーフェクト！🎉</div>`;

  rs.innerHTML = `
    <div class="result-hero">
      <div class="result-icon">${icon}</div>
      <div class="result-score ${isComm?'score-c-comm':'score-c-logic'}">${s.score}<span class="result-denom"> / ${s.active.length}</span></div>
      <div class="result-pct">${pct}%　（${modeLabel}）</div>
      <div class="result-msg">${msg}</div>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num" style="color:var(--green)">${s.score}</div><div class="stat-lbl">正解</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--red)">${s.active.length-s.score}</div><div class="stat-lbl">不正解</div></div>
      <div class="stat-card"><div class="stat-num" style="color:${isComm?'var(--comm-accent)':'var(--logic-accent)'}">${pct}%</div><div class="stat-lbl">正解率</div></div>
    </div>
    ${missHTML}
    <button class="retry-btn retry-${tab}" onclick="initQuiz('${tab}')">もう一度挑戦する 🔄</button>
  `;
}

// 起動
initQuiz('logic');
initQuiz('comm');
</script>
</body>
</html>
