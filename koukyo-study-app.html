<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公共 テスト対策クイズ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Sans', 'Noto Sans JP', Arial, sans-serif;
    background: #0f1923;
    color: #e8edf2;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #1a2a3a 0%, #0f1923 100%);
    border-bottom: 3px solid #2ecc71;
    padding: 20px 24px 16px;
    text-align: center;
  }

  header h1 {
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: 0.05em;
    color: #fff;
  }

  header h1 span {
    color: #2ecc71;
  }

  .tabs {
    display: flex;
    background: #131f2b;
    border-bottom: 2px solid #1e3448;
    overflow-x: auto;
  }

  .tab {
    flex: 1;
    min-width: 100px;
    padding: 14px 10px;
    text-align: center;
    font-size: 0.82rem;
    font-weight: 700;
    color: #6b8099;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tab:hover { color: #a8c4d8; }

  .tab.active {
    color: #2ecc71;
    border-bottom-color: #2ecc71;
    background: #0f1923;
  }

  .tab-emoji { display: block; font-size: 1.2rem; margin-bottom: 4px; }

  .content {
    max-width: 700px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }

  .section { display: none; }
  .section.active { display: block; }

  /* スコア表示 */
  .score-bar {
    background: #1a2a3a;
    border-radius: 12px;
    padding: 14px 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .score-label { font-size: 0.8rem; color: #6b8099; }
  .score-num { font-size: 1.8rem; font-weight: 900; color: #2ecc71; }
  .score-total { font-size: 0.9rem; color: #6b8099; }

  .progress-track {
    flex: 1;
    height: 8px;
    background: #1e3448;
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #2ecc71, #27ae60);
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* 問題カード */
  .q-card {
    background: #1a2a3a;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    border: 2px solid #1e3448;
    transition: border-color 0.3s;
  }

  .q-card.correct { border-color: #2ecc71; }
  .q-card.wrong { border-color: #e74c3c; }

  .q-num {
    font-size: 0.72rem;
    color: #2ecc71;
    font-weight: 700;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .q-text {
    font-size: 1rem;
    line-height: 1.7;
    color: #c8d8e8;
    margin-bottom: 16px;
  }

  .q-text strong {
    color: #fff;
    font-weight: 700;
  }

  /* 選択肢 */
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .choice-btn {
    background: #0f1923;
    border: 2px solid #1e3448;
    border-radius: 10px;
    padding: 12px 14px;
    color: #a8c4d8;
    font-size: 0.9rem;
    font-family: 'Hiragino Sans', 'Noto Sans JP', Arial, sans-serif;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    line-height: 1.4;
  }

  .choice-btn:hover:not(:disabled) {
    border-color: #2ecc71;
    color: #fff;
    background: #1a2a3a;
  }

  .choice-btn.selected-correct {
    background: #1a4a2a;
    border-color: #2ecc71;
    color: #2ecc71;
    font-weight: 700;
  }

  .choice-btn.selected-wrong {
    background: #4a1a1a;
    border-color: #e74c3c;
    color: #e74c3c;
    font-weight: 700;
  }

  .choice-btn.show-answer {
    background: #1a4a2a;
    border-color: #2ecc71;
    color: #2ecc71;
  }

  .choice-btn:disabled { cursor: default; }

  /* フィードバック */
  .feedback {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.88rem;
    display: none;
  }

  .feedback.correct {
    background: #1a4a2a;
    color: #2ecc71;
    display: block;
  }

  .feedback.wrong {
    background: #4a1a1a;
    color: #ff8080;
    display: block;
  }

  /* 結果画面 */
  .result-screen {
    display: none;
    text-align: center;
    padding: 40px 20px;
  }

  .result-screen.show { display: block; }

  .result-emoji { font-size: 4rem; margin-bottom: 16px; }
  .result-score { font-size: 3rem; font-weight: 900; color: #2ecc71; }
  .result-msg { color: #6b8099; margin: 12px 0 24px; font-size: 1rem; }

  .btn-retry {
    background: #2ecc71;
    color: #0f1923;
    border: none;
    border-radius: 12px;
    padding: 14px 32px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Hiragino Sans', 'Noto Sans JP', Arial, sans-serif;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn-retry:hover { opacity: 0.85; }

  /* セクションタイトル */
  .section-title {
    font-size: 1.1rem;
    font-weight: 900;
    color: #fff;
    margin-bottom: 4px;
  }

  .section-sub {
    font-size: 0.8rem;
    color: #6b8099;
    margin-bottom: 20px;
  }

  /* 表形式問題 */
  .table-hint {
    background: #131f2b;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 16px;
    font-size: 0.82rem;
    color: #6b8099;
    border-left: 3px solid #2ecc71;
  }
</style>
</head>

      choices: ["自立・社会", "雇用・教育", "医療・福祉", "住居・就労"],
      answer: 0
    },
    {
      q: "2003年に制定された、役所や事業者が障がい者への（　）配慮をすることを定めた法律は？",
      choices: ["障害者差別解消法", "障害者基本法", "障害者雇用促進法", "バリアフリー法"],
      answer: 0
    },
    {
      q: "障害者差別解消法で求められる配慮の種類は？",
      choices: ["合理的配慮", "特別配慮", "優先配慮", "平等配慮"],
      answer: 0
    },
    {
      q: "部落差別で差別される具体的な場面（3つ）：職業・居住・（　）",
      choices: ["結婚", "教育", "医療", "選挙"],
      answer: 0
    },
    {
      q: "男女の役割分担の差別判例：昇格や（　）の男女差別が問題となった。",
      choices: ["賃金", "採用", "配属", "退職金"],
      answer: 0
    },
  ]
];

// 状態管理
const state = [
  { answered: [], scores: 0 },
  { answered: [], scores: 0 },
  { answered: [], scores: 0 }
];

// シャッフル
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// クイズ描画
function renderQuiz(sectionIdx) {
  const qs = quizData[sectionIdx];
  const container = document.getElementById(`quiz-${sectionIdx}`);
  container.innerHTML = '';
  state[sectionIdx].answered = new Array(qs.length).fill(null);
  state[sectionIdx].scores = 0;

  document.getElementById(`score-${sectionIdx}`).textContent = '0';
  document.getElementById(`total-${sectionIdx}`).textContent = ` / ${qs.length}`;
  document.getElementById(`progress-${sectionIdx}`).style.width = '0%';
  document.getElementById(`result-${sectionIdx}`).classList.remove('show');

  qs.forEach((q, qi) => {
    // 選択肢をシャッフル（正解インデックスを追跡）
    const indexed = q.choices.map((c, i) => ({ text: c, orig: i }));
    const shuffled = shuffle(indexed);
    const correctShuffledIdx = shuffled.findIndex(s => s.orig === q.answer);

    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `card-${sectionIdx}-${qi}`;

    const choicesHTML = shuffled.map((c, ci) =>
      `<button class="choice-btn" onclick="answer(${sectionIdx},${qi},${ci},${correctShuffledIdx})" id="btn-${sectionIdx}-${qi}-${ci}">${c.text}</button>`
    ).join('');

    card.innerHTML = `
      <div class="q-num">Q${qi + 1}</div>
      <div class="q-text">${q.q}</div>
      <div class="choices">${choicesHTML}</div>
      <div class="feedback" id="fb-${sectionIdx}-${qi}"></div>
    `;
    container.appendChild(card);
  });
}

function answer(sectionIdx, qi, selectedIdx, correctIdx) {
  if (state[sectionIdx].answered[qi] !== null) return;

  const isCorrect = selectedIdx === correctIdx;
  state[sectionIdx].answered[qi] = isCorrect;

  const qs = quizData[sectionIdx];
  const card = document.getElementById(`card-${sectionIdx}-${qi}`);
  const fb = document.getElementById(`fb-${sectionIdx}-${qi}`);

  // ボタン全部無効化
  const btns = card.querySelectorAll('.choice-btn');
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === correctIdx) b.classList.add('show-answer');
  });

  if (isCorrect) {
    btns[selectedIdx].classList.remove('show-answer');
    btns[selectedIdx].classList.add('selected-correct');
    card.classList.add('correct');
    fb.className = 'feedback correct';
    fb.textContent = '✅ 正解！';
    state[sectionIdx].scores++;
  } else {
    btns[selectedIdx].classList.add('selected-wrong');
    card.classList.add('wrong');
    fb.className = 'feedback wrong';
    fb.textContent = `❌ 不正解… 正解は「${qs[qi].choices[qs[qi].answer]}」`;
  }

  // スコア更新
  const answered = state[sectionIdx].answered.filter(a => a !== null).length;
  const score = state[sectionIdx].scores;
  const total = qs.length;

  document.getElementById(`score-${sectionIdx}`).textContent = score;
  document.getElementById(`progress-${sectionIdx}`).style.width = `${(answered / total) * 100}%`;

  // 全問回答チェック
  if (answered === total) {
    setTimeout(() => showResult(sectionIdx, score, total), 600);
  }
}

function showResult(sectionIdx, score, total) {
  const pct = score / total;
  let emoji, msg;
  if (pct === 1) { emoji = '🏆'; msg = '完璧！全問正解！'; }
  else if (pct >= 0.8) { emoji = '🎉'; msg = 'すごい！もう少しで完璧！'; }
  else if (pct >= 0.6) { emoji = '👍'; msg = 'いい感じ！もう1回やってみよう！'; }
  else { emoji = '💪'; msg = 'もう一度チャレンジ！'; }

  document.getElementById(`result-emoji-${sectionIdx}`).textContent = emoji;
  document.getElementById(`result-score-${sectionIdx}`).textContent = `${score} / ${total}`;
  document.getElementById(`result-msg-${sectionIdx}`).textContent = msg;
  document.getElementById(`result-${sectionIdx}`).classList.add('show');
}

function retrySection(sectionIdx) {
  renderQuiz(sectionIdx);
  window.scrollTo(0, 0);
}

function switchTab(idx) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.section').forEach((s, i) => s.classList.toggle('active', i === idx));
}

// 初期化
renderQuiz(0);
renderQuiz(1);
renderQuiz(2);
</script>
